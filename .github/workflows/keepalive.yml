name: Keep Alive & Check Alerts

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 minutes
  workflow_dispatch:          # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend + run alert check
        run: |
          curl -s --max-time 90 -X POST https://card-finder-backend.onrender.com/run-alert-check || true
          echo "Alert check triggered"
