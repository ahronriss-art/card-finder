services:
  - type: web
    name: card-finder-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: EBAY_APP_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_MESSAGING_SERVICE_SID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: PSA_API_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SHOPS_PASSWORD
        sync: false
      # Lets an external pinger (cron-job.org / UptimeRobot) drive
      # /run-alert-check without a session, which both wakes the sleeping
      # free-tier service and keeps the alert scan on schedule.
      - key: CRON_TOKEN
        sync: false
